        .page-header { background: linear-gradient(135deg, var(--primary-red) 0%, #c41e3a 100%); color: #fff; padding: 50px 0; text-align: center; }
        .page-header h1 { font-size: 36px; margin-bottom: 10px; }
        .page-header p { font-size: 16px; opacity: 0.9; }
        .filter-tabs { display: flex; gap: 10px; margin: 30px 0; flex-wrap: wrap; justify-content: center; }
        .filter-tabs button { padding: 10px 25px; border: 2px solid var(--primary-red); background: #fff; color: var(--primary-red); border-radius: 25px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .filter-tabs button.active, .filter-tabs button:hover { background: var(--primary-red); color: #fff; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .gallery-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; cursor: pointer; background: #f0f0f0; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 50px 10px 10px; color: #fff; font-size: 12px; line-height: 1.4; }
        .gallery-item .category { position: absolute; top: 10px; left: 10px; background: var(--primary-red); color: #fff; padding: 3px 10px; border-radius: 10px; font-size: 11px; }
        .total-count { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
        @media(max-width: 900px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media(max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        function renderGallery(filter = 'all') {
            const grid = document.getElementById('galleryGrid');
            const filtered = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
            
            document.getElementById('totalCount').textContent = `共 ${filtered.length} 张照片`;
            
            grid.innerHTML = filtered.map(p => `
                <div class="gallery-item" onclick="previewImage('${p.src}', '${p.title}')">
                    <img src="${p.src}" alt="${p.title}" onerror="this.style.display='none'">
                    <span class="category">${p.category}</span>
                    <div class="overlay">${p.title}</div>
                </div>
            `).join('');
        }
        
        function filterGallery(tag, btn) {
            document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGallery(tag);
        }
        
        function previewImage(src, title) {
            document.getElementById('previewImg').src = src;
            document.getElementById('previewText').textContent = title;
            document.getElementById('previewModal').style.display = 'flex';
        }
        
        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }
        
        renderGallery();
