    <style>
        .page-header { background: linear-gradient(135deg, var(--primary-red) 0%, #c41e3a 100%); color: #fff; padding: 50px 0; text-align: center; }
        .page-header h1 { font-size: 36px; margin-bottom: 10px; }
        .page-header p { font-size: 16px; opacity: 0.9; }
        .circle-tabs { display: flex; gap: 8px; margin: 30px 0; flex-wrap: wrap; justify-content: center; }
        .circle-tabs button { padding: 8px 18px; border: 2px solid var(--primary-red); background: #fff; color: var(--primary-red); border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .circle-tabs button.active, .circle-tabs button:hover { background: var(--primary-red); color: #fff; }
        .circle-content { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .circle-content h2 { color: var(--primary-red); font-size: 22px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .activity-list { list-style: none; padding: 0; margin: 0; }
        .activity-list li { display: flex; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .activity-list li:last-child { border-bottom: none; }
        .activity-list .icon { width: 40px; height: 40px; background: var(--light-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }
        .activity-list .content { flex: 1; }
        .activity-list h4 { color: #333; font-size: 15px; margin-bottom: 5px; }
        .activity-list p { color: #888; font-size: 13px; margin: 0; }
        .activity-list .time { color: var(--primary-red); font-size: 13px; white-space: nowrap; margin-left: 15px; }
        .photo-section { margin-top: 25px; }
        .photo-section h3 { color: var(--primary-red); font-size: 18px; margin-bottom: 15px; }
        .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .photo-item { border-radius: 8px; overflow: hidden; aspect-ratio: 1; cursor: pointer; background: #f0f0f0; position: relative; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .photo-item:hover img { transform: scale(1.1); }
        .photo-item span { display: block; padding: 5px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; text-align: center; position: absolute; bottom: 0; left: 0; right: 0; }
        @media(max-width: 900px) { .photo-grid { grid-template-columns: repeat(3, 1fr); } }
        @media(max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>

        function renderTabs() {
            const tabs = document.getElementById('circleTabs');
            Object.keys(circlesData).forEach((name, i) => {
                const btn = document.createElement('button');
                btn.textContent = name;
                btn.onclick = () => showCircle(name, btn);
                if (i === 0) btn.classList.add('active');
                tabs.appendChild(btn);
            });
        }
        
        function showCircle(name, btn) {
            document.querySelectorAll('.circle-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const data = circlesData[name];
            let html = `<h2>📋 ${name} 2026年度履职计划</h2>`;
            html += '<ul class="activity-list">';
            data.activities.forEach(a => {
                html += `<li><div class="icon">${a.icon}</div><div class="content"><h4>${a.title}</h4><p>${a.desc}</p></div><span class="time">${a.time}</span></li>`;
            });
            html += '</ul>';
            
            if (data.photos && data.photos.length > 0) {
                html += '<div class="photo-section"><h3>📷 界别活动照片</h3><div class="photo-grid">';
                data.photos.forEach(p => {
                    html += `<div class="photo-item" onclick="previewImage('${p.src}', '${p.title}')">
                        <img src="${p.src}" alt="${p.title}" onerror="this.style.display='none'">
                        <span>${p.title}</span>
                    </div>`;
                });
                html += '</div></div>';
            }
            
            document.getElementById('circleContent').innerHTML = html;
        }
        
        function previewImage(src, title) {
            document.getElementById('previewImg').src = src;
            document.getElementById('previewText').textContent = title;
            document.getElementById('previewModal').style.display = 'flex';
        }
        
        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }
        
        renderTabs();
        showCircle(Object.keys(circlesData)[0], document.querySelector('.circle-tabs button'));
