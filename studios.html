        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; }
        .stat-card { background: #fff; border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 4px solid var(--primary-red); }
        .stat-card .number { font-size: 42px; font-weight: bold; color: var(--primary-red); }

        .filter-tabs button.active, .filter-tabs button:hover { background: var(--primary-red); color: #fff; }
        .studio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .studio-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .studio-card:hover { transform: translateY(-5px); }
        .studio-card img { width: 100%; height: 160px; object-fit: cover; background: #f0f0f0; }
        .studio-card .info { padding: 20px; }
        .studio-card h3 { color: var(--primary-red); font-size: 16px; margin-bottom: 10px; }
        .studio-card p { color: #666; font-size: 13px; margin: 5px 0; }
        .studio-card .tag { display: inline-block; background: #ffe6e6; color: var(--primary-red); padding: 3px 10px; border-radius: 10px; font-size: 11px; margin-top: 8px; }
        @media(max-width: 900px) { .studio-grid { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width: 600px) { .studio-grid { grid-template-columns: 1fr; } }
    </style>

                    <div class="info">
                        <h3>${s.name}</h3>
                        <p><strong>领衔委员：</strong>${s.leader}</p>
                        <p><strong>地址：</strong>${s.address}</p>
                        <span class="tag">${s.type}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function filterStudios(type, btn) {
            document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderStudios(type);
        }
        
        renderStudios();
    </script>
</body>
</html>
