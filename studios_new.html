    <style>
        .page-hero {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-red) 100%);
            color: #fff;
            padding: 80px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }
        .page-hero h1 { font-size: 36px; margin-bottom: 10px; position: relative; }
        .page-hero p { font-size: 16px; opacity: 0.9; position: relative; }
        
        .stats-bar {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin: -40px auto 40px;
            max-width: 1000px;
            position: relative;
            z-index: 10;
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .stats-item {
            text-align: center;
        }
        .stats-item .num {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-red);
        }
        .stats-item .txt {
            font-size: 14px;
            color: var(--text-gray);
        }

        .studios-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .studio-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.4s;
        }
        .studio-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }
        .studio-image {
            height: 160px;
            position: relative;
            overflow: hidden;
        }
        .studio-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .studio-card:hover .studio-image img {
            transform: scale(1.1);
        }
        .studio-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--dark-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .studio-body {
            padding: 20px;
        }
        .studio-body h3 {
            font-size: 16px;
            color: var(--text-dark);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .studio-body .info-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-gray);
        }
        .studio-body .info-row .icon {
            color: var(--primary-red);
            flex-shrink: 0;
        }
        .type-badge {
            display: inline-block;
            background: #f5f5f5;
            color: var(--text-gray);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
        }

        /* 无图片时的渐变背景 */
        .gradient-bg-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .gradient-bg-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .gradient-bg-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .gradient-bg-4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .gradient-bg-5 { background: linear-gradient(135deg, #fa709a, #fee140); }
        .gradient-bg-6 { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .gradient-bg-7 { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .gradient-bg-8 { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        .gradient-bg-9 { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
        .gradient-bg-10 { background: linear-gradient(135deg, #d299c2, #fef9d7); }

        @media (max-width: 992px) {
            .studios-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .studios-grid { grid-template-columns: 1fr; }
            .page-hero h1 { font-size: 28px; }
            .stats-bar { margin: -30px 20px 30px; }
        }
    </style>
</head>

                const badgeText = s.type === '五星级' ? '五星级' : (s.type === '四星级' ? '四星级' : s.type);
                const imageHtml = s.img 
                    ? `<img src="${s.img}" alt="${s.name}" onerror="this.parentElement.className='studio-image ${s.gradient}'; this.style.display='none';">`
                    : `<div class="studio-image ${s.gradient}" style="display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;">🏛️</div>`;
                
                return `
                    <div class="studio-card animate-in" style="animation-delay: ${index * 0.05}s">
                        <div class="studio-image">
                            ${imageHtml}
                            <span class="studio-badge">${badgeText}</span>
                        </div>
                        <div class="studio-body">
                            <h3>${s.name}</h3>
                            <div class="info-row">
                                <span class="icon">👤</span>
                                <span>领衔委员：${s.leader}</span>
                            </div>
                            <div class="info-row">
                                <span class="icon">📍</span>
                                <span>${s.address}</span>
                            </div>
                            <span class="type-badge">${s.type}</span>
                        </div>
                    </div>
                `;
            }).join('');

            // 触发动画
            setTimeout(() => {
                document.querySelectorAll('.animate-in').forEach((el, i) => {
                    setTimeout(() => el.classList.add('visible'), i * 50);
                });
            }, 100);
        }

        function filterStudios(type, btn) {
            document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderStudios(type);
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        // 初始渲染
        renderStudios();
    </script>
</body>
</html>
